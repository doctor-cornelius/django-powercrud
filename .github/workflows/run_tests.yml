name: Run Test Matrix

on:
  workflow_dispatch:
    inputs:
      run_playwright_full:
        description: "Also run the full Playwright suite"
        type: boolean
        required: false
        default: true
  workflow_call:
    inputs:
      run_playwright_full:
        description: "Also run the full Playwright suite"
        type: boolean
        required: false
        default: false

env:
  UV_LINK_MODE: copy

jobs:
  tests:
    name: Python Matrix (Required)
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: tests.settings
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            django: "5.2"
            constraints-file: "requirements/constraints-django52.txt"
          - python-version: "3.13"
            django: "5.2"
            constraints-file: "requirements/constraints-django52.txt"
          - python-version: "3.14"
            django: "5.2"
            constraints-file: "requirements/constraints-django52.txt"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-cache-${{ runner.os }}-${{ matrix.python-version }}-${{ matrix.django }}-${{ hashFiles('pyproject.toml', 'uv.lock', 'requirements/constraints-*.txt') }}

      - name: Install test dependencies
        run: |
          PYTHON="$(python -c 'import sys; print(sys.executable)')"
          uv pip install --python "$PYTHON" --constraint "${{ matrix.constraints-file }}" ".[tests-core]"

      - name: Run pytest
        run: pytest -m "not playwright"

  playwright-smoke:
    name: Playwright Smoke (Required)
    runs-on: ubuntu-latest
    needs: tests
    env:
      DJANGO_SETTINGS_MODULE: tests.settings
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: |
          PYTHON="$(python -c 'import sys; print(sys.executable)')"
          uv pip install --python "$PYTHON" --constraint requirements/constraints-django52.txt ".[tests-core]" ".[tests-ui]"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: Build static assets
        run: npm run build

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run Playwright smoke suite with coverage append
        run: pytest -m playwright_smoke --cov-append --no-cov-on-fail

      - name: Generate combined coverage report
        run: coverage xml

      - name: Upload combined coverage to Codecov
        if: hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  playwright-full:
    name: Playwright Full (Manual)
    if: ${{ inputs.run_playwright_full }}
    continue-on-error: true
    outputs:
      suite_status: ${{ steps.capture_status.outputs.suite_status }}
    runs-on: ubuntu-latest
    needs:
      - tests
      - playwright-smoke
    env:
      DJANGO_SETTINGS_MODULE: tests.settings
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: |
          PYTHON="$(python -c 'import sys; print(sys.executable)')"
          uv pip install --python "$PYTHON" --constraint requirements/constraints-django52.txt ".[tests-core]" ".[tests-ui]"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: Build static assets
        run: npm run build

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run full Playwright suite
        id: full_suite
        continue-on-error: true
        run: pytest -m playwright --no-cov-on-fail

      - name: Capture non-blocking suite status
        id: capture_status
        if: always()
        run: |
          suite_status="success"
          if [[ "${{ steps.full_suite.outcome }}" == "failure" ]]; then
            suite_status="failure"
          fi
          echo "suite_status=${suite_status}" >> "$GITHUB_OUTPUT"

      - name: Summarise non-blocking regression outcome
        if: always()
        run: |
          if [[ "${{ steps.capture_status.outputs.suite_status }}" == "failure" ]]; then
            echo "::warning::Manual Playwright regression suite failed. Review the 'Playwright Full (Manual)' job."
            {
              echo "## Manual Browser Regression"
              echo
              echo "Playwright smoke passed, but the manually requested full Playwright regression suite failed."
              echo "Review the 'Playwright Full (Manual)' job."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Manual Browser Regression"
              echo
              echo "The manually requested full Playwright regression suite passed."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  playwright-summary:
    name: Browser Summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - tests
      - playwright-smoke
      - playwright-full
    steps:
      - name: Summarise browser check outcomes
        env:
          REQUIRED_TESTS_RESULT: ${{ needs.tests.result }}
          REQUIRED_SMOKE_RESULT: ${{ needs.playwright-smoke.result }}
          FULL_RESULT: ${{ needs.playwright-full.result }}
          FULL_SUITE_STATUS: ${{ needs.playwright-full.outputs.suite_status }}
        run: |
          {
            echo "## Browser Check Summary"
            echo
            echo "- Required Python matrix: ${REQUIRED_TESTS_RESULT}"
            echo "- Required Playwright smoke: ${REQUIRED_SMOKE_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${FULL_RESULT}" == "skipped" ]]; then
            {
              echo "- Manual Playwright full: not requested"
              echo
              echo "The full Playwright regression suite was not requested for this run."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          full_suite_status="${FULL_SUITE_STATUS:-unknown}"

          {
            echo "- Manual Playwright full: ${full_suite_status}"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${full_suite_status}" == "failure" ]]; then
            {
              echo "Playwright smoke passed, but the manually requested full Playwright regression suite failed."
              echo "Review the 'Playwright Full (Manual)' job."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All configured browser checks passed." >> "$GITHUB_STEP_SUMMARY"
          fi
