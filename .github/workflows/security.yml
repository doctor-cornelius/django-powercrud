name: Security

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: "22 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy Baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Block high and critical filesystem vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true

      - name: Build Django Docker image
        run: docker build -f docker/dockerfile_django -t django-powercrud:${{ github.sha }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: django-powercrud:${{ github.sha }}
          format: table
          trivyignores: .trivyignore.yaml
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
          skip-setup-trivy: true

      - name: Block high and critical image vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: django-powercrud:${{ github.sha }}
          format: table
          trivyignores: .trivyignore.yaml
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          license-check: false

  socket-firewall:
    name: Socket Firewall
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Socket Firewall
        uses: SocketDev/action@v1.3.2
        with:
          mode: firewall-free

      - name: Install npm dependencies through Socket Firewall
        run: sfw npm ci --include=optional
