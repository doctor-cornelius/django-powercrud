name: Deploy Documentation

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag against project version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          release_version = os.environ["RELEASE_VERSION"]
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:(?:a|b|rc)\d+)?", release_version):
              raise SystemExit(f"Tag {release_version!r} is not a publishable release tag")

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          actual_version = data["project"]["version"]
          if actual_version != release_version:
              raise SystemExit(
                  f"pyproject.toml version {actual_version!r} does not match tag {release_version!r}"
              )
          PY

      - uses: actions/setup-python@v6
        with:
          python-version: 3.14.4

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-awesome-nav
          pip install mkdocs-blog-plugin

      - name: Build documentation
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
