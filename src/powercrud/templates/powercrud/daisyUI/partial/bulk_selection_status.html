<!-- Bulk actions container - show/hide based on selection count -->
<div id="bulk-actions-container"
     class="join {% if selected_count == 0 %}hidden{% endif %}"
     data-powercrud-bulk-actions="true"
     hx-target="this"
     hx-swap="outerHTML"
     hx-trigger="bulkSelectionChanged from:body">
    {% if enable_bulk_edit %}
        <a href="{{ list_view_url }}bulk-edit/"
           class="join-item btn btn-sm btn-primary {{ view.get_extra_button_classes }}"
           hx-get="{{ list_view_url }}bulk-edit/"
           hx-target="#{{ modal_target|default:'powercrudModalContent' }}"
           hx-swap="innerHTML"
           data-powercrud-modal-trigger="true"
           data-powercrud-modal-box-classes="{{ bulk_modal_box_classes|default:'modal-box flex max-h-[calc(100dvh-2rem)] flex-col' }}"
           onclick="document.getElementById('{{ modal_id|default:'powercrudBaseModal' }}').showModal();">
            Bulk Edit <span id="selected-items-counter">{{ selected_count }}</span>
        </a>
    {% else %}
        <span class="join-item btn btn-sm btn-neutral no-animation cursor-default {{ view.get_extra_button_classes }}">
            Selected <span id="selected-items-counter">{{ selected_count }}</span>
        </span>
    {% endif %}
    <button class="join-item btn btn-sm btn-outline btn-error {{ view.get_extra_button_classes }}"
            data-powercrud-clear-selection
            hx-post="{{ list_view_url }}clear-selection/"
            hx-target="#bulk-actions-container"
            hx-swap="outerHTML">
        Clear Selection
    </button>
</div>
