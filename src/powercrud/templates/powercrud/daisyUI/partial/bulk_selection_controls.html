{% if selection_control == "matching" %}
    <div class="flex items-center gap-2">
        {% if show_select_all_matching %}
            <button type="button"
                    class="link link-primary text-sm font-medium"
                    hx-post="{{ list_view_url }}select-all-matching/{% if request.GET %}?{{ request.GET.urlencode }}{% endif %}"
                    hx-target="#bulk-actions-container"
                    hx-swap="outerHTML">
                {{ select_all_matching_label }}
            </button>
        {% elif show_select_all_matching_limit %}
            <span class="text-xs text-base-content/70">
                {{ bulk_selection_meta_message }}
            </span>
        {% endif %}
    </div>
{% elif selection_control == "select_all" %}
    <th class="bg-neutral text-neutral-content text-center align-middle sticky-header w-10">
        <input type="checkbox"
               id="select-all-checkbox"
               class="checkbox checkbox-sm checkbox-neutral border-1 border-white"
               data-powercrud-select-all="true"
               data-powercrud-initial-checked="{% if all_selected %}true{% else %}false{% endif %}"
               data-powercrud-initial-indeterminate="{% if some_selected and not all_selected %}true{% else %}false{% endif %}"
               {% if all_selected %}checked{% endif %}
               {% if some_selected and not all_selected %}indeterminate{% endif %}>
    </th>
{% elif selection_control == "row" %}
    <td class="py-0 align-middle">
        <input type="checkbox"
               class="checkbox checkbox-sm row-select-checkbox"
               data-powercrud-row-select="true"
               data-id="{{ row.id }}"
               data-powercrud-initial-checked="{% if row.id|stringformat:'s' in selected_ids %}true{% else %}false{% endif %}"
               autocomplete="off"
               {% if row.id|stringformat:"s" in selected_ids %}checked{% endif %}
               hx-post="{{ list_view_url }}toggle-selection/{{ row.id }}/"
               hx-target="#bulk-actions-container"
               hx-swap="outerHTML">
    </td>
{% endif %}
