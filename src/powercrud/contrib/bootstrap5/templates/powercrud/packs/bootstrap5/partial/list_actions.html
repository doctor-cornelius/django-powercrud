{% load powercrud %}

{% if create_view_url %}
    {% if use_htmx and htmx_target %}
        <a class="btn btn-primary {{ view.get_extra_button_classes }}"
           href="{{ create_view_url }}"
           hx-get="{{ create_view_url }}"
           hx-target="{{ htmx_target }}"
           data-powercrud-modal-trigger="true">
            Create {{ object_verbose_name }}
        </a>
    {% else %}
        <a class="btn btn-primary {{ view.get_extra_button_classes }}" href="{{ create_view_url }}">
            Create {{ object_verbose_name }}
        </a>
    {% endif %}
{% endif %}
{% extra_buttons view %}
