<div id="bulk-actions-container" class="btn-group {% if selected_count == 0 %}d-none{% endif %}" data-powercrud-bulk-actions="true" hx-target="this" hx-swap="outerHTML" hx-trigger="bulkSelectionChanged from:body">
    {% if enable_bulk_edit %}<a href="{{ list_view_url }}bulk-edit/" class="btn btn-sm btn-primary {{ view.get_extra_button_classes }}" hx-get="{{ list_view_url }}bulk-edit/" hx-target="#{{ modal_target|default:'powercrudModalContent' }}" hx-swap="innerHTML" data-powercrud-modal-trigger="true" {% if modal_uses_legacy_classes or not bulk_modal_presentation_attrs %}data-powercrud-modal-box-classes="{{ bulk_modal_box_classes|default:'modal-dialog-scrollable modal-lg' }}"{% else %}{{ bulk_modal_presentation_attrs|safe }}{% endif %}>Bulk Edit <span id="selected-items-counter">{{ selected_count }}</span></a>{% else %}<span class="btn btn-sm btn-secondary disabled {{ view.get_extra_button_classes }}">Selected <span id="selected-items-counter">{{ selected_count }}</span></span>{% endif %}
    <button class="btn btn-sm btn-outline-danger {{ view.get_extra_button_classes }}" data-powercrud-clear-selection hx-post="{{ list_view_url }}clear-selection/" hx-target="#bulk-actions-container" hx-swap="outerHTML">Clear Selection</button>
</div>
