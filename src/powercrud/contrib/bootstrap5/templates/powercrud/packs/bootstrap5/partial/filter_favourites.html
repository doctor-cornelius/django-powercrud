<div id="{{ filter_favourites_toolbar_dom_id }}" class="dropdown" data-powercrud-filter-favourites-dropdown="true" data-powercrud-filter-favourites-toolbar="true" data-powercrud-filter-favourites-view-key="{{ filter_favourites_view_key }}" data-powercrud-toolbar-dom-id="{{ filter_favourites_toolbar_dom_id }}" data-powercrud-current-state-json="{{ current_list_state_json|escape }}">
    <button type="button" class="btn btn-outline-secondary pc-bootstrap-toolbar-icon-button {{ view.get_extra_button_classes }}" aria-label="{% if selected_filter_favourite_name %}Saved favourite: {{ selected_filter_favourite_name }}{% else %}Saved favourites{% endif %}" data-powercrud-filter-favourites-selected="{% if selected_filter_favourite_name %}true{% else %}false{% endif %}" data-powercrud-filter-favourites-default-label="Saved favourites" data-powercrud-tooltip="semantic" data-bs-title="{% if selected_filter_favourite_name %}{{ selected_filter_favourite_name }}{% else %}Saved favourites{% endif %}" data-powercrud-filter-favourites-trigger="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="pc-bootstrap-toolbar-icon{% if selected_filter_favourite_name %} d-none{% endif %}" aria-hidden="true" data-powercrud-filter-favourites-icon-outline="true"><path d="m8 2.748-.717-.737C5.6.281 2.514 1.054 1.4 3.123c-.523.97-.641 2.181-.099 3.41C2.006 8.129 3.986 10.012 8 13.25c4.014-3.238 5.994-5.12 6.699-6.717.542-1.229.424-2.44-.099-3.41C13.486 1.053 10.4.28 8.717 2.01zM8 15C-7.333 4.868 3.279-3.04 8 1.334 12.721-3.04 23.333 4.868 8 15"/></svg>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="pc-bootstrap-toolbar-icon text-primary{% if not selected_filter_favourite_name %} d-none{% endif %}" aria-hidden="true" data-powercrud-filter-favourites-icon-filled="true"><path d="M8 15C-7.333 4.868 3.279-3.04 8 1.334 12.721-3.04 23.333 4.868 8 15"/></svg>
        <span class="visually-hidden" data-powercrud-filter-favourites-trigger-label="true">{{ selected_filter_favourite_name|default:"Saved favourites" }}</span>
    </button>
    <div hidden data-powercrud-filter-favourites-template="true"><div class="dropdown-menu p-0 shadow pc-bootstrap-favourites-menu" data-powercrud-filter-favourites-panel-shell="true"><div class="pc-bootstrap-favourites-panel" data-powercrud-filter-favourites-panel="true">{% include framework_template_path|add:"/partial/filter_favourites_panel.html" %}</div></div></div>
</div>
