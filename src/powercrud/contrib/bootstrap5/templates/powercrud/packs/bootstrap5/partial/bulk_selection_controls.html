{% if selection_control == "matching" %}
    <div class="d-flex align-items-center gap-2">{% if show_select_all_matching %}<button type="button" class="btn btn-link btn-sm p-0" hx-post="{{ list_view_url }}select-all-matching/{% if request.GET %}?{{ request.GET.urlencode }}{% endif %}" hx-target="#bulk-actions-container" hx-swap="outerHTML">{{ select_all_matching_label }}</button>{% elif show_select_all_matching_limit %}<span class="small text-body-secondary">{{ bulk_selection_meta_message }}</span>{% endif %}</div>
{% elif selection_control == "select_all" %}
    <th scope="col" class="pc-bootstrap-selection-column align-middle"><input type="checkbox" id="select-all-checkbox" class="form-check-input" data-powercrud-select-all="true" data-powercrud-initial-checked="{% if all_selected %}true{% else %}false{% endif %}" data-powercrud-initial-indeterminate="{% if some_selected and not all_selected %}true{% else %}false{% endif %}" {% if all_selected %}checked{% endif %} {% if some_selected and not all_selected %}indeterminate{% endif %}></th>
{% elif selection_control == "row" %}
    <td class="pc-bootstrap-selection-column align-middle"><input type="checkbox" class="form-check-input row-select-checkbox" data-powercrud-row-select="true" data-id="{{ row.id }}" data-powercrud-initial-checked="{% if row.id|stringformat:'s' in selected_ids %}true{% else %}false{% endif %}" autocomplete="off" {% if row.id|stringformat:"s" in selected_ids %}checked{% endif %} hx-post="{{ list_view_url }}toggle-selection/{{ row.id }}/" hx-target="#bulk-actions-container" hx-swap="outerHTML"></td>
{% endif %}
