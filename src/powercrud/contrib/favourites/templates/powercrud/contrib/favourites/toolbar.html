<div id="{{ filter_favourites_toolbar_dom_id }}"
     class="dropdown dropdown-start relative z-[60] hidden -ml-px"
     data-powercrud-filter-favourites-dropdown="true"
     data-powercrud-filter-favourites-toolbar="true"
     data-powercrud-filter-favourites-view-key="{{ filter_favourites_view_key }}"
     data-powercrud-toolbar-dom-id="{{ filter_favourites_toolbar_dom_id }}"
     data-powercrud-current-state-json="{{ current_list_state_json|escape }}">
    <button type="button"
            class="btn btn-outline btn-secondary btn-sm rounded-l-none flex items-center gap-2"
            data-powercrud-filter-favourites-default-label="Favourites"
            data-powercrud-filter-favourites-trigger="true">
        <span class="text-secondary" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 16 16"
                 fill="currentColor"
                 class="size-4">
                <path d="m8 2.748-.717-.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 2.01z"/>
            </svg>
        </span>
        <span class="inline-block max-w-[15ch] overflow-hidden text-ellipsis whitespace-nowrap align-bottom"
              data-powercrud-filter-favourites-trigger-label="true"
              {% if selected_filter_favourite_name and selected_filter_favourite_name|length > 15 %}
              data-powercrud-tooltip="overflow"
              data-tippy-content="{{ selected_filter_favourite_name }}"
              {% endif %}>
            {{ selected_filter_favourite_name|default:"Favourites" }}
        </span>
    </button>
    <div hidden
         data-powercrud-filter-favourites-template="true">
        <div class="left-0 z-[70] mt-2 w-72 rounded-box border border-base-300 bg-base-100 p-3 shadow-xl sm:left-3"
             data-powercrud-filter-favourites-panel-shell="true">
            <div data-powercrud-filter-favourites-panel="true">
                {% include "powercrud/contrib/favourites/toolbar_panel.html" %}
            </div>
        </div>
    </div>
</div>
