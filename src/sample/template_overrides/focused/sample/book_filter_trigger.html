<button class="btn btn-outline btn-accent {{ view.get_extra_button_classes }}" type="button"
        data-sample-focused-component="filter-trigger"
        data-powercrud-filter-toggle
        id="filterToggleBtn"
        aria-controls="filterCollapse"
        aria-expanded="false"
        aria-label="Show filters"
        data-powercrud-tooltip="semantic"
        data-tippy-content="Show filters">

         width="16"
         height="16"
         fill="currentColor"
         class="bi bi-funnel text-accent"
         data-powercrud-filter-toggle-icon-outline="true"
         viewBox="0 0 16 16"

        <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5zm1 .5v1.308l4.372 4.858A.5.5 0 0 1 7 8.5v5.306l2-.666V8.5a.5.5 0 0 1 .128-.334L13.5 3.308V2z"/>

         width="16"
         height="16"
         fill="currentColor"
         class="bi bi-funnel-fill hidden text-secondary"
         data-powercrud-filter-toggle-icon-filled="true"
         viewBox="0 0 16 16"
         aria-hidden="true">
        <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5z"/>

    <svg xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 20 20"
         fill="currentColor"
         class="h-4 w-4"
         aria-hidden="true">
        <path fill-rule="evenodd"
